name: Publishing Code Coverage

on:
  workflow_call:
    inputs:
      artifact:
        description: 'Name of the coverage artifact.'
        required: true
        type: string
      coverage_file:
        description: 'Name of the coverage file.'
        required: false
        default: 'CodeCoverage.xml'
        type: string
      publish_to_codecov:
        description: 'Publish coverage results to CodeCov.'
        required: false
        default: 'true'
        type: string
      publish_to_codacy:
        description: 'Publish coverage results to Codacy.'
        required: false
        default: 'true'
        type: string
    secrets:
      codacy_token:
        description: 'Token to push result to codacy.'
        required: false

jobs:

  PublishCoverage:
    name: 📈 Publish collected Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download 'Coverage XML Report' artifact
        uses: actions/download-artifact@v2
        with:
          name: ${{ inputs.artifact }}

      - name: Debugging 1
        run: |
          sudo apt-get update
          sudo apt-get install tree
      - name: Debugging 2
        run: |
          tree artifacts

      - name: 📊 Publish coverage at CodeCov
        continue-on-error: true
        uses: codecov/codecov-action@v1
        if: inputs.publish_to_codecov == 'true'
        with:
          file: ${{ inputs.coverage_file }}
          flags: unittests
#          env_vars: PYTHON

      - name: 📉 Publish coverage at Codacy
        continue-on-error: true
        uses: codacy/codacy-coverage-reporter-action@master
        if: inputs.publish_to_codacy == 'true'
        with:
          project-token: ${{ secrets.codacy_token }}
          coverage-reports: ${{ inputs.coverage_file }}
